/* =========================
   📋 MOSTRAR TREINO
========================= */
function mostrarTreino(){

  const aluno = document.getElementById("aluno").value;
  const dia = document.getElementById("dia").value;
  const grupoFiltro = document.getElementById("grupo").value;

  const lista = document.getElementById("visor_exercicio");
  const tabela = document.getElementById("tabelaTreino");

  lista.innerHTML = "";
  tabela.innerHTML = "";

  let ultimoGrupo = "";

  const estado = {};

  treinos[aluno][dia].forEach((ex, i) => {

    if(grupoFiltro && ex.grupoMuscular !== grupoFiltro){
      return;
    }

    estado[i] = {
      ativo:false,
      tempo:0,
      descanso:tempoParaSegundos(ex.descanso)
    };

    /* ===== TABELA ===== */
    tabela.innerHTML += `
      <tr>
        <td>${ex.exercicio}</td>
		<td>${ex.variacao}</td>
        <td>${ex.series}</td>
        <td>${ex.reps}</td>
        <td>${ex.descanso}</td>
      </tr>
    `;

    /* ===== GRUPO ===== */
    if(ex.grupoMuscular !== ultimoGrupo){
      lista.innerHTML += `<li class="li_gpm">${ex.grupoMuscular}</li>`;
      ultimoGrupo = ex.grupoMuscular;
    }

    /* ===== LISTA ===== */
    lista.innerHTML += `
      <li class="li_ex" onclick="toggle(${i}, this)">
        <span>${ex.exercicio}</span>
        <span>${ex.variacao} </span> 
        <span>${ex.series}x${ex.reps}</span>
        <span id="t${i}">0s</span>
        <span id="d${i}">--</span>
      </li>
    `;
  });
}

/* =========================
   ▶️ EXERCÍCIO
========================= */
function toggleEx(index, el){
  const estado = estadoExercicios[index];

  if(!estado.ativo){
    estado.ativo = true;
    estado.inicio = new Date();

    el.classList.add("ativo");

    estado.intervalo = setInterval(() => {
      const diff = Math.floor((new Date() - estado.inicio)/1000);
      document.getElementById(`timer-${index}`).innerText = diff + "s";
    }, 1000);

  } else {
    clearInterval(estado.intervalo);

    estado.ativo = false;
    el.classList.remove("ativo");
    el.classList.add("feito");

    iniciarDescanso(index);
  }
}

/* =========================
   💤 DESCANSO
========================= */
function iniciarDescanso(index){
  const estado = estadoExercicios[index];

  estado.descansoRestante = estado.descansoTotal;

  estado.descansoIntervalo = setInterval(() => {

    estado.descansoRestante--;

    document.getElementById(`descanso-${index}`).innerText =
      estado.descansoRestante + "s";

    if(estado.descansoRestante <= 0){
      clearInterval(estado.descansoIntervalo);

      document.getElementById(`descanso-${index}`).innerText = "GO!";

      notificar("Descanso acabou 💪");

      if(navigator.vibrate){
        navigator.vibrate([200,100,200]);
      }
    }

  }, 1000);
}
