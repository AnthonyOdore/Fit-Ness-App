function tempoParaSegundos(desc){
  if(desc.includes("min")){
    return parseInt(desc) * 60;
  }
  if(desc.includes("s")){
    return parseInt(desc);
  }
  return 60; // padrão
}

exercicios.forEach((ex, index) => {

        estadoExercicios[index] = {
          ativo: false,
          inicio: null,
          intervalo: null,
          descansoTotal: tempoParaSegundos(ex.descanso),
          descansoRestante: 0,
          descansoIntervalo: null
        };

        visor_exercicio.innerHTML += `
          <li class="li_gpm">${ex.grupoMuscular || ""}</li>

          <li class="li_ex" onclick="toggleEx(${index}, this)">
            <span>${ex.exercicio}</span>
            <span>${ex.series} x ${ex.reps}</span>
            <span id="timer-${index}">0s</span>
            <span id="descanso-${index}">--</span>
            
          </li>
        `;
      });
    });
    document.getElementById("nome_aluno").innerText = aluno.toUpperCase() + "  -  " + dia.toUpperCase()

  }else{
    window.alert("treino nao encontrado")
  }

}
function atualizarMediaSession(exercicio, index){
  if ('mediaSession' in navigator) {

    navigator.mediaSession.metadata = new MediaMetadata({
      title: exercicio.exercicio + " - " + exercicio.variacao, // nome do exercício
      artist: `Séries: ${exercicio.series} | Reps: ${exercicio.reps}`,
      album: `Descanso: ${exercicio.descanso}`,
      artwork: [
        {
          src: 'https://cdn-icons-png.flaticon.com/512/1048/1048953.png',
          sizes: '512x512',
          type: 'image/png'
        }
      ]
    });

    // botão voltar
    navigator.mediaSession.setActionHandler('previoustrack', () => {
      trocarExercicio(index - 1);
    });

    // botão avançar
    navigator.mediaSession.setActionHandler('nexttrack', () => {
      trocarExercicio(index + 1);
    });

    navigator.mediaSession.setActionHandler('play', () => {
      toggleEx(index, document.querySelectorAll('.li_ex')[index]);
    });

    navigator.mediaSession.setActionHandler('pause', () => {
      toggleEx(index, document.querySelectorAll('.li_ex')[index]);
    });
  }
}

function trocarExercicio(novoIndex){
  const lista = document.querySelectorAll('.li_ex');

  if(lista[novoIndex]){
    lista[novoIndex].click();
  }
}
function toggleEx(index, elemento){
  const estado = estadoExercicios[index];

  if(!estado.ativo){
    // ▶️ INICIAR EXERCÍCIO
    estado.ativo = true;
    estado.inicio = new Date();

    elemento.classList.add("ativo");

    estado.intervalo = setInterval(() => {
      const agora = new Date();
      const diff = Math.floor((agora - estado.inicio)/1000);

      document.getElementById(`timer-${index}`).innerText = diff + "s";
    }, 1000);

  } else {
    // ⏹️ FINALIZAR EXERCÍCIO → INICIAR DESCANSO
    clearInterval(estado.intervalo);

    elemento.classList.remove("ativo");
    elemento.classList.add("feito");

    estado.ativo = false;

    iniciarDescanso(index, elemento);
  }
}
function iniciarDescanso(index, elemento){
  const estado = estadoExercicios[index];

  estado.descansoRestante = estado.descansoTotal;

  estado.descansoIntervalo = setInterval(() => {

    estado.descansoRestante--;

    document.getElementById(`descanso-${index}`).innerText =
      estado.descansoRestante + "s";

    // 🔥 ACABOU DESCANSO
    if(estado.descansoRestante <= 0){
      clearInterval(estado.descansoIntervalo);
      document.getElementById(`descanso-${index}`).innerText = "GO!";
    }

  }, 1000);
}

const estados = {}

function carregartreino(){
  const aluno = document.getElementById("aluno").value;
  const dia = document.getElementById("dia").value;
  const cron_body = document.querySelector("#cron_exer")

  cron_body.innerHTML ="";
  
  treinos[aluno][dia].forEach((exercicio,index)=>{
    const tr = document.createElement("tr")

    tr.innerHTML = `<td>${exercicio}</td>
                    <td id="inicio-${index}">--</td>
                    <td id="fim-${index}">--</td>
                    <td id="tempo-${index}">0s</td>
                    <td><button onclick="toggle(${index})">iniciar</button></td>
                    `

                    estados[index]={
                      rodando:false,
                      inicio:null,
                      fim:null

                    }
                    tbody.appendChild(tr)
  })
}

function toggle(index){
  const estado = estados[index]
  const btn = document.querySelectorAll("button")[index + 1]

  if(!estado.rodando){
    estado.inicio = new Date()

    document.getElementById(`inicio-${index}`).textContent = estado.inicio.toLocaleTimeString()
    estado.intervalo = setInterval(()=>{
      const agora = new Date()
      const diff = Math.floor((agora - estado.inicio)/1000)
      document.getElementById(`tempo-${index}`).textContent = diff +"s"
    },1000)

    btn.textContent = "Parar"
    estado.rodando = true
  }else{
    const fim = new Date()
    document.getElementById(`fim-${index}`).textContent = fim.toLocaleTimeString()

    clearInterval(estado.intervalo)

    const total = Math.floor((fim - estado.inicio)/1000)
    document.getElementById(`tempo-${index}`).textContent = total +"s"

    btn.textContent = total + "s"
    btn.textContent = "Iniciar"
    estado.rodando = false
  }
}
