<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Visualizar Treinos</title>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center}
.li_ex{background:#053800;margin:5px;padding:10px;border-radius:5px}
</style>
</head>

<body>

<h2>Selecionar usuário</h2>
<select id="usuarios" onchange="mostrarTreinos()"></select>

<ul id="lista"></ul>

<script>

let dados = {};

/* =========================
   CARREGAR JSON
========================= */
async function carregar(){
  const res = await fetch("dados.json");
  dados = await res.json();

  preencherUsuarios();
}

/* =========================
   SELECT USUÁRIOS
========================= */
function preencherUsuarios(){
  const select = document.getElementById("usuarios");

  for(let nome in dados.usuarios){
    select.innerHTML += `<option value="${nome}">${nome}</option>`;
  }

  mostrarTreinos();
}

/* =========================
   MOSTRAR TREINOS
========================= */
function mostrarTreinos(){
  const usuario = document.getElementById("usuarios").value;
  const lista = document.getElementById("lista");

  lista.innerHTML = "";

  const treinos = dados.usuarios[usuario].treinos;

  treinos.forEach(ex => {
    lista.innerHTML += `
      <li class="li_ex">
        ${ex.exercicio} - ${ex.series}x${ex.reps}
      </li>
    `;
  });
}

/* =========================
   START
========================= */
carregar();

</script>

</body>
</html>
